<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>특별실 예약 관리</title>
  <link rel="stylesheet" href="style.css?v=3" />
</head>
<body>
  <div class="container">
    <!-- 상단 헤더 -->
    <header class="top-bar">
      <div class="date-nav">
        <button id="prevWeek" class="btn-icon">←</button>
        <select id="weekSelect"></select>
        <button id="nextWeek" class="btn-icon">→</button>
        <button id="todayBtn" class="btn btn-dark">오늘</button>
      </div>
      <div class="actions">
        <button id="myReservationsBtn" class="btn btn-blue">내예약보기</button>
        <button id="sheetSettingsBtn" class="btn btn-purple admin-only">구글시트 설정</button>
        <button id="saveToServerBtn" class="btn btn-orange">서버로 저장</button>
        <button id="loadFromServerBtn" class="btn btn-teal">서버에서 불러오기</button>
        <button id="adminBtn" class="btn btn-gray" title="관리자 모드">🔒</button>
      </div>
    </header>

    <!-- 특별실 탭 -->
    <nav class="tabs" id="roomTabs"></nav>

    <!-- 시간표 -->
    <main>
      <h2 id="roomTitle">시간표</h2>
      <table class="schedule" id="scheduleTable"></table>
    </main>
  </div>

  <!-- 예약 입력 모달 -->
  <div class="modal-backdrop" id="reservationModal" hidden>
    <div class="modal">
      <h3>예약하기</h3>
      <label>예약자명</label>
      <input id="resName" type="text" />
      <label>학급</label>
      <input id="resClass" type="text" placeholder="예: 6-1" />
      <label>목적</label>
      <input id="resPurpose" type="text" placeholder="예: 실험 수업" />
      <label>비밀번호 (4자리)</label>
      <input id="resPassword" type="password" maxlength="4" inputmode="numeric" />
      <div class="modal-actions">
        <button class="btn btn-gray" data-close>취소</button>
        <button class="btn btn-blue" id="saveReservationBtn">저장</button>
      </div>
    </div>
  </div>

  <!-- 예약 상세/수정/삭제 모달 -->
  <div class="modal-backdrop" id="detailModal" hidden>
    <div class="modal">
      <h3>예약 정보</h3>
      <div id="detailInfo"></div>
      <div class="modal-actions">
        <button class="btn btn-gray" data-close>닫기</button>
        <button class="btn btn-red" id="deleteResBtn">삭제</button>
        <button class="btn btn-blue" id="editResBtn">수정</button>
      </div>
    </div>
  </div>

  <!-- 내 예약 목록 모달 -->
  <div class="modal-backdrop" id="myListModal" hidden>
    <div class="modal modal-wide">
      <h3 id="myListTitle">내 예약 목록</h3>
      <div id="myListBody"></div>
      <div class="modal-actions">
        <button class="btn btn-gray" data-close>닫기</button>
      </div>
    </div>
  </div>

  <!-- 구글시트 설정 모달 -->
  <div class="modal-backdrop" id="settingsModal" hidden>
    <div class="modal modal-wide">
      <h3>서버(Apps Script) 설정</h3>
      <label>Apps Script Web App URL</label>
      <input id="apiUrlInput" type="text" placeholder="https://script.google.com/macros/s/..../exec" />
      <label><input type="checkbox" id="serverEnabled" /> 서버 연동 활성화</label>
      <label><input type="checkbox" id="autoSave" /> 자동 저장 (입력 시 서버로 저장)</label>
      <label><input type="checkbox" id="autoLoad" /> 자동 불러오기 (주기적으로 서버에서 가져오기)</label>
      <label>자동 불러오기 주기
        <select id="autoLoadInterval">
          <option value="10">10초</option>
          <option value="20" selected>20초</option>
          <option value="60">60초</option>
        </select>
      </label>
      <hr />
      <p><strong>관리자/복구 기능</strong></p>
      <div class="row">
        <button class="btn btn-red" id="cleanServerBtn">서버 데이터 정리</button>
        <button class="btn btn-gray" id="resetLocalBtn">이 PC 데이터 초기화</button>
      </div>
      <div class="modal-actions">
        <button class="btn btn-gray" data-close>취소</button>
        <button class="btn btn-dark" id="testConnBtn">연결 테스트</button>
        <button class="btn btn-blue" id="saveSettingsBtn">저장</button>
      </div>
    </div>
  </div>

  <!-- 관리자: 정규시간표 편집 모달 -->
  <div class="modal-backdrop" id="scheduleEditModal" hidden>
    <div class="modal modal-wide">
      <h3>정규 시간표 편집 (관리자)</h3>
      <p class="hint">셀을 클릭해서 표시 텍스트를 입력하세요. 비우면 삭제됩니다.</p>
      <div id="scheduleEditBody"></div>
      <div class="modal-actions">
        <button class="btn btn-gray" data-close>닫기</button>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="app.js"></script>
</body>
</html>
